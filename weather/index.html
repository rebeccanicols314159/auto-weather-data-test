<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

  <h2>Weather Data Dashboard</h2>

  <label>Select variables:</label><br>
  <select id="variables" multiple size="6">
    <option value="temp_C">Temperature (°C)</option>
    <option value="windspeedKmph">Wind Speed (km/h)</option>
    <option value="pressureMB">Pressure (mb)</option>
    <option value="cloudcover">Cloud Cover (%)</option>
    <option value="visibilityKm">Visibility (km)</option>
    <option value="precipMM">Precipitation (mm)</option>
  </select>

  <br><br>
  <button onclick="updateGraph()">Update Graph</button>

  <div id="graph" style="width:100%;max-width:1000px;"></div>

  <script>
    let globalData = [];

    // Load data
    fetch("data.json")
      .then(res => res.json())
      .then(data => {
        globalData = data;
        updateGraph(); // initial plot
      });

    function updateGraph() {
      const selected = Array.from(document.getElementById("variables").selectedOptions)
                            .map(opt => opt.value);

      const xaxislabels = {
        temp_C: "Temperature (°C)",
        windspeedKmph: "Wind Speed (km/h)",
        pressureMB: "Pressure (mb)",
        cloudcover: "Cloud Cover (%)",
        visibilityKm: "Visibility (km)",
        precipMM: "Precipitation (mm)"
      };

      const yaxislabels = {
        temp_C: "y1",
        windspeedKmph: "y2",
        pressureMB: "y3",
        cloudcover: "y4",
        visibilityKm: "y5",
        precipMM: "y6"
      };

      const traces = selected.map(variable => ({
        x: globalData.map(d => d.time),
        y: globalData.map(d => d[variable]),
        mode: "lines",
        name: xaxislabels[variable],
        yaxis: yaxislabels[variable]
      }));

      const layout = {
        margin: { t: 30 },
        xaxis: { title: "Time" },
        yaxis: { title: "Temperature (°C)" },
        yaxis2: { title: "Wind Speed (km/h)", overlaying: "y", side: "right" },
        yaxis3: { title: "Pressure (mb)", overlaying: "y", side: "right" , position: 0.9},
        yaxis4: { title: "Cloud Cover (%)", overlaying: "y", side: "left", position: 0.1 },
        yaxis5: { title: "Visibility (km)", overlaying: "y", side: "right", position: 0.8 },
        yaxis6: { title: "Precipitation (mm)", overlaying: "y", side: "left", position: 0.2 }
      };

      Plotly.newPlot("graph", traces, layout);
      };
  </script>

</body>
</html>
